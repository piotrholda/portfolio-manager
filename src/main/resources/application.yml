spring:
  config.import: optional:file:.env[.properties],optional:file:src/main/resources/alphavantage.env[.properties]
  jpa:
    open-in-view: false
  jmx:
    enabled: false
  springdoc:
    swagger-ui:
      enabled: true
      url: /docs/openapi.json
      path: /swagger-ui.html
    api-docs:
      enabled: true
      path: /v3/api-docs
alphavantage:
  base-url:  https://www.alphavantage.co/query
  api-key: ${ALPHAVANTAGE_API_KEY:}
  full-history-enabled: false
stooq:
  base-url: https://stooq.pl/q/d/l/
  api-key: ${STOOQ_API_KEY:}
stock-api:
  base-path: http://localhost:5000
